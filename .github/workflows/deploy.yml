name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - server
          - web-client

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            path: server
          - name: web-client
            path: web-client
    steps:
      - uses: actions/checkout@v4

      - name: Check if lint is needed
        id: should-lint
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ "$SERVICE" = "all" ] || [ "$SERVICE" = "${{ matrix.name }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.should-lint.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        if: steps.should-lint.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Lint
        if: steps.should-lint.outputs.run == 'true'
        working-directory: ${{ matrix.path }}
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/glossary/glossary-app/deploy
            sudo git -C /var/www/glossary/glossary-app pull

            TARGET="${{ github.event.inputs.service }}"
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod"

            case "$TARGET" in
              server)
                $COMPOSE up -d --build --no-deps app
                ;;
              web-client)
                $COMPOSE up -d --build --no-deps web-client
                ;;
              *)
                $COMPOSE up -d --build
                ;;
            esac

            # Reload nginx to pick up any upstream changes (zero-downtime)
            $COMPOSE exec nginx nginx -s reload || true
